# .github/workflows/aci-mirror.yml
#
# Spiegelt das stuendliche NOAA Arctic Composite (VIS + IR) auf den
# Orphan-Branch `aci`. Force-Push haelt die Historie konstant bei
# einem Commit — das Repo waechst nicht, main/Pages bleiben unberuehrt.
# Kacheln laden via raw.githubusercontent.com/sscherergo/tta/aci/…

name: ACI Mirror

on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: aci-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (nur Skript)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            aci_mirror.py
          sparse-checkout-cone-mode: false

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: httpx installieren
        run: pip install httpx

      - name: Vorherige Bilder vom aci-Branch holen (Change-Detection)
        run: |
          git fetch origin aci --depth 1 2>/dev/null && \
            git checkout origin/aci -- aci_vis.gif aci_ir.gif \
              2>/dev/null || echo "Noch kein aci-Branch — Erstlauf."

      - name: Komposit holen
        run: python aci_mirror.py

      - name: Auf Orphan-Branch aci pushen (Force, Historie = 1 Commit)
        run: |
          ls aci_*.gif 1>/dev/null 2>&1 || { echo "Keine Bilder."; exit 0; }
          mkdir /tmp/aci && cp aci_*.gif /tmp/aci/
          cd /tmp/aci
          git init -q -b aci
          git config user.name  "aci-bot"
          git config user.email "actions@github.com"
          git add .
          git commit -q -m "ACI $(date -u '+%Y-%m-%d %H:%MZ')"
          git push --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            aci:aci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
