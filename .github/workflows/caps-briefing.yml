# .github/workflows/caps-briefing.yml
#
# Erzeugt zweimal taeglich das CAPS/NWP-Routenbriefing.
# - briefing.txt                          = immer das neueste (iPad-Kurzbefehl)
# - briefings/briefing_YYYYMMDDTHHMMZ.txt = Archiv, die 10 juengsten Laeufe
#
# Abruf neuestes:  https://raw.githubusercontent.com/<USER>/<REPO>/main/briefing.txt
# Archiv-Ansicht:  https://github.com/<USER>/<REPO>/tree/main/briefings

name: CAPS Route Briefing

on:
  schedule:
    - cron: "45 5 * * *"    # nach dem 00Z-Lauf
    - cron: "45 17 * * *"   # nach dem 12Z-Lauf
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: caps-briefing
  cancel-in-progress: true

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: ecCodes installieren
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libeccodes0 libeccodes-data

      - name: Python-Pakete installieren
        run: pip install -r requirements.txt

      - name: Briefing erzeugen und archivieren
        run: |
          mkdir -p briefings
          STAMP=$(date -u '+%Y%m%dT%H%MZ')
          OUT="briefings/briefing_${STAMP}.txt"
          python caps_route_forecast.py > "$OUT"
          echo "" >> "$OUT"
          echo "Erzeugt: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$OUT"
          cp "$OUT" briefing.txt
          tail -n 5 briefing.txt

      - name: Archiv auf 10 juengste Briefings begrenzen
        run: |
          cd briefings
          ls -1 briefing_*.txt | sort | head -n -10 | xargs -r rm -v --
          cd ..
          ls -1 briefings/

      - name: Briefings committen
        run: |
          git config user.name  "caps-bot"
          git config user.email "actions@github.com"
          git add -A briefing.txt briefings/
          git diff --cached --quiet && echo "Keine Aenderung." && exit 0
          git commit -m "CAPS-Briefing $(date -u '+%Y-%m-%d %H:%MZ')"
          git pull --rebase origin main
          git push
