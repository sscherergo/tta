# .github/workflows/sigwx-mirror.yml
#
# Spiegelt die amtlichen SIGWX/GFA-Charts (NAV CANADA, AAWU, IMO/WAFC)
# nach sigwx/ — die Cockpit-Kacheln zeigen lokale Kopien, weil
# Hotlink-Schutz/Mixed-Content die Direkteinbettung blockiert.
# Takt: 4x taeglich kurz nach den GFA-Ausgaben (~05:30/11:30/17:30/23:30Z).

name: SIGWX Mirror

on:
  schedule:
    - cron: "50 5,11,17,23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sigwx-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: httpx installieren
        run: pip install httpx

      - name: Charts spiegeln
        run: python sigwx_mirror.py

      - name: Committen
        run: |
          git config user.name  "sigwx-bot"
          git config user.email "actions@github.com"
          git add -A sigwx/
          git diff --cached --quiet && echo "Keine Aenderung." && exit 0
          git commit -m "SIGWX-Spiegel $(date -u '+%Y-%m-%d %H:%MZ')"
          for i in 1 2 3; do
            git push && exit 0
            echo "Push abgewiesen (Versuch $i) — origin einholen"
            git pull --rebase -X theirs origin main
          done
          git push
