# .github/workflows/sat-movie.yml
#
# Aktuelles Ueberflug-Mosaik (VIIRS-Granulen) ueber den Flugkorridor.
# Nur EIN Bild wird gepflegt (sat_movie/latest.jpg + meta.json) —
# der Detail-Zoom laeuft im Viewer live gegen NASA GIBS, ohne
# Repo-Speicher. Committet wird nur bei neuen Ueberfluegen.
#
# Viewer:  https://<USER>.github.io/<REPO>/movie.html

name: Sat Movie

on:
  schedule:
    # Stuendlich: neue Granulen erscheinen (Orbit ~101 min + LANCE-
    # Latenz 1,5-3 h) etwa alle 1-2 h — der Stundentakt haelt die
    # Zusatzwartezeit minimal. Aenderungserkennung committet nur bei
    # wirklich neuen Ueberfluegen; leere Ticks enden in Sekunden.
    # Minute :45 = versetzt zu den Briefing-Ticks (:07/:22/:37/:52).
    - cron: "45 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sat-movie
  cancel-in-progress: false

jobs:
  movie:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pakete installieren
        run: pip install httpx pillow

      - name: Frame abrufen (Aenderungserkennung im Skript)
        run: python sat_movie.py

      - name: Committen (nur bei neuem Frame)
        run: |
          if [ ! -d sat_movie ]; then
            echo "Kein Frame erzeugt — nichts zu committen."
            exit 0
          fi
          git config user.name  "sat-movie-bot"
          git config user.email "actions@github.com"
          git add -A sat_movie/
          git diff --cached --quiet && echo "Kein neuer Frame." && exit 0
          git commit -m "Sat-Bild $(date -u '+%Y-%m-%d %H:%MZ')"
          for i in 1 2 3; do
            git push && exit 0
            echo "Push abgewiesen (Versuch $i) — origin einholen"
            git pull --rebase -X theirs origin main
          done
          git push
