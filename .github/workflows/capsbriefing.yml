# .github/workflows/caps-briefing.yml
#
# Polling-Architektur: In den Publikationsfenstern wird alle 15 min
# geprueft, ob der neue CAPS-Lauf VOLLSTAENDIG auf dem Datamart liegt
# (letzte Datei PT048H). Erst dann laeuft das Briefing — typ. 5-15 min
# nach Publikationsende statt fester Pufferzeiten. state/last_run.txt
# stellt sicher, dass jeder Modelllauf genau einmal verarbeitet wird;
# alle anderen Ticks enden nach Sekunden ("Kein neuer Lauf").
#
# Manueller Start: force=true erzwingt ein Briefing (z.B. fuer frische
# METAR/TAF/Satellit), auch wenn der Lauf schon verarbeitet wurde.
# WICHTIG (Fix 20.07.): force uebersteuert NICHT mehr den
# Vollstaendigkeits-Check eines NEUEN Laufs — ein unvollstaendig
# publizierter Lauf beendet den Tick sauber statt das Briefing
# crashen zu lassen (Vorfall 20.07. 05:47Z: 00Z-Lauf nur Ozean-.nc,
# Atmosphaeren-GRIBs fehlten noch).

name: CAPS Route Briefing

on:
  schedule:
    # Rund um die Uhr alle 15 min: robust gegen GitHubs Cron-Ausfaelle
    # und Registrierungs-Verzoegerungen. Kostenlos (public repo), der
    # Check-Job endet in ~20 s; state/last_run.txt garantiert trotzdem
    # genau EIN Briefing je Modelllauf (typ. ~06:45 und ~18:45 UTC).
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Briefing erzwingen (auch ohne neuen Modelllauf)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: caps-briefing
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
      candidate: ${{ steps.gate.outputs.candidate }}
    steps:
      - name: Checkout (nur state/)
        uses: actions/checkout@v4

      - name: Neuen vollstaendigen Lauf pruefen
        id: gate
        run: |
          set -u
          CAND_DATE=$(date -u -d '-5 hours' +%Y%m%d)
          H=$(date -u -d '-5 hours' +%H)
          CAND_RUN=$([ "$H" -ge 12 ] && echo 12 || echo 00)
          CAND="${CAND_DATE}${CAND_RUN}"
          LAST=$(cat state/last_run.txt 2>/dev/null || echo none)
          echo "Kandidat: $CAND — zuletzt verarbeitet: $LAST"
          FORCE="${{ inputs.force && 'true' || 'false' }}"

          if [ "$CAND" = "$LAST" ]; then
            if [ "$FORCE" = "true" ]; then
              # Lauf bereits verarbeitet -> force = Re-Briefing auf diesem
              # Lauf (frische METAR/TAF/Satellit). Vollstaendigkeit ist
              # durch die fruehere Verarbeitung belegt.
              echo "force: Re-Briefing auf bereits verarbeitetem Lauf $CAND."
              echo "proceed=true"      >> "$GITHUB_OUTPUT"
              echo "candidate=$CAND"   >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Kein neuer Lauf — Tick beendet."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Neuer Kandidat: Vollstaendigkeit ist IMMER Pflicht — auch mit
          # force. (force soll frische Obs erzwingen, keine halben Laeufe.)
          FNAME="${CAND_DATE}T${CAND_RUN}Z_MSC_CAPS_AirTemp_AGL-2m_RLatLon0.03_PT048H.grib2"
          OK=false
          for BASE in https://dd.weather.gc.ca/today/model_caps/3km \
                      https://hpfx.collab.science.gc.ca/today/model_caps/3km; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 25 \
                   -I "$BASE/$CAND_RUN/048/$FNAME" || echo 000)
            case "$CODE" in
              200) OK=true; echo "Vollstaendig auf $BASE"; break ;;
              404) echo "$BASE erreichbar, PT048H fehlt noch (404) — Lauf $CAND unvollstaendig" ;;
              *)   echo "$BASE nicht erreichbar (HTTP/$CODE)" ;;
            esac
          done

          if [ "$OK" = "true" ]; then
            echo "proceed=true"      >> "$GITHUB_OUTPUT"
            echo "candidate=$CAND"   >> "$GITHUB_OUTPUT"
          elif [ "$FORCE" = "true" ] && [ "$LAST" != "none" ]; then
            # force waehrend Publikationsluecke: sauber auf dem letzten
            # vollstaendigen Lauf re-briefen statt auf den halben neuen.
            echo "force: Lauf $CAND unvollstaendig -> Re-Briefing auf letztem Lauf $LAST."
            echo "proceed=true"      >> "$GITHUB_OUTPUT"
            echo "candidate=$LAST"   >> "$GITHUB_OUTPUT"
          else
            echo "Lauf $CAND noch nicht vollstaendig — Tick beendet."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  briefing:
    needs: check
    if: needs.check.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: ecCodes installieren
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libeccodes0 libeccodes-data

      - name: Python-Pakete installieren
        run: pip install -r requirements.txt

      - name: Briefing erzeugen und archivieren
        run: |
          mkdir -p briefings
          STAMP=$(date -u '+%Y%m%dT%H%MZ')
          OUT="briefings/briefing_${STAMP}.txt"
          python caps_route_forecast.py > "$OUT"
          echo "" >> "$OUT"
          echo "Erzeugt: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$OUT"
          cp "$OUT" briefing.txt
          tail -n 5 briefing.txt

      - name: Archiv auf 10 juengste Briefings begrenzen
        run: |
          cd briefings
          ls -1 briefing_*.txt | sort | head -n -10 | xargs -r rm -v --
          cd ..

      - name: Verarbeiteten Lauf in state/ festhalten
        run: |
          mkdir -p state
          RUN=$(grep -oP 'CAPS-Modelllauf \K\d{8} \d{2}' briefing.txt | tr -d ' ')
          echo "${RUN:-${{ needs.check.outputs.candidate }}}" > state/last_run.txt
          echo "State: $(cat state/last_run.txt)"

      - name: Karten-Dashboard rendern (Archiv-Rotation im Skript)
        run: python map_dashboard.py --lead 12 || echo "Karte fehlgeschlagen — nicht fatal"

      - name: Satellitenbilder abrufen (Archiv-Rotation im Skript)
        run: python sat_chips.py || echo "Satellitenabruf fehlgeschlagen — nicht fatal"

      - name: Committen
        run: |
          git config user.name  "caps-bot"
          git config user.email "actions@github.com"
          git add -A briefing.txt briefings/ dashboard_map.png maps/ sat/ state/
          git diff --cached --quiet && echo "Keine Aenderung." && exit 0
          git commit -m "CAPS-Briefing $(date -u '+%Y-%m-%d %H:%MZ')"
          # Push mit Retry: bewegt sich origin parallel (anderer Workflow),
          # gewinnen bei Konflikten unsere frisch GENERIERTEN Dateien
          # (-X theirs = im Rebase der eigene, gerade erzeugte Commit).
          for i in 1 2 3; do
            git push && exit 0
            echo "Push abgewiesen (Versuch $i) — origin einholen"
            git pull --rebase -X theirs origin main
          done
          git push
