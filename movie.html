<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TTA Satellit — Korridor & Zoom</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #0d1117; color: #e6edf3;
         font: 15px/1.45 -apple-system, "SF Pro Text", sans-serif; }
  header { padding: 12px 16px; background: #161b22;
           border-bottom: 1px solid #30363d; }
  header h1 { margin: 0; font-size: 17px; }
  #sub { font-size: 12.5px; color: #8b949e; margin-top: 2px; }
  main { padding: 12px; max-width: 1200px; margin: 0 auto; }
  #viewport { background: #161b22; border: 1px solid #30363d;
              border-radius: 10px; overflow: hidden; position: relative;
              height: 72vh; touch-action: none; display: flex;
              align-items: center; justify-content: center; }
  #pan { transform-origin: 0 0; position: absolute; top: 0; left: 0;
         will-change: transform; }
  #pan img { display: block; max-width: none; }
  .loadbtn { background: #21262d; color: #58a6ff; border: 1px solid #30363d;
             border-radius: 8px; padding: 12px 20px; font-size: 15px; }
  #hint { font-size: 12.5px; color: #8b949e; margin-top: 8px; }
  #zoombox { position: fixed; inset: 0; background: #000d;
             display: none; align-items: center; justify-content: center;
             flex-direction: column; z-index: 10; padding: 10px; }
  #zoombox img { max-width: 96vw; max-height: 82vh; border-radius: 8px;
                 border: 1px solid #30363d; }
  #zoomcap { color: #e6edf3; font-size: 13px; margin: 10px 4px;
             text-align: center; }
  #zoombox button { margin-top: 4px; }
  footer { color: #484f58; font-size: 11px; text-align: center;
           padding: 16px 0 28px; }
  a { color: #58a6ff; }
</style>
</head>
<body>
<header>
  <h1>Satellit — NWP-Korridor mit Detail-Zoom</h1>
  <div id="sub">VIIRS-Überflüge (Zeitstempel je Sektor im Bild). Ziehen =
  verschieben, Rad/Pinch = zoomen, <b>Doppeltipp = Detailausschnitt in
  voller Auflösung live von NASA GIBS</b>.</div>
</header>
<main>
  <div id="viewport">
    <button class="loadbtn" id="load">Aktuelles Bild laden (~0,8 MB)</button>
    <div id="pan" hidden><img id="base" alt="Korridor"></div>
  </div>
  <div id="hint"></div>
  <p style="font-size:13px"><a href="index.html">← zurück zum Cockpit</a></p>
</main>

<div id="zoombox">
  <img id="zoomimg" alt="Detail">
  <div id="zoomcap"></div>
  <button class="loadbtn" onclick="document.getElementById('zoombox').style.display='none'">Schließen</button>
</div>

<footer>Planungshilfe — ersetzt kein amtliches Briefing.</footer>

<script>
const bust = "?t=" + Math.floor(Date.now() / 300000);
let meta = null;
let scale = 1, tx = 0, ty = 0;
const vp = document.getElementById("viewport");
const pan = document.getElementById("pan");
const base = document.getElementById("base");

function apply() {
  pan.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}

const loadBtn = document.getElementById("load");
loadBtn.onclick = async () => {
  loadBtn.textContent = "lade meta.json …";
  let resp;
  try {
    resp = await fetch("sat_movie/meta.json" + bust);
  } catch { resp = null; }
  if (!resp || !resp.ok) {
    loadBtn.textContent = "Noch kein Bild im Repo — Workflow \u201eSat Movie\u201c " +
      "einmal unter Actions starten, dann hier neu laden.";
    return;
  }
  try { meta = await resp.json(); }
  catch { loadBtn.textContent = "meta.json fehlerhaft."; return; }

  loadBtn.textContent = "lade Bild …";
  base.onload = () => {
    loadBtn.remove();
    pan.hidden = false;
    scale = vp.clientWidth / base.naturalWidth;
    tx = 0; ty = Math.max(0, (vp.clientHeight - base.naturalHeight * scale) / 2);
    apply();
    document.getElementById("hint").textContent =
      "Stand: " + meta.updated.slice(0, 16).replace("T", " ") + "Z — " +
      "Doppeltipp auf eine Stelle lädt den Ausschnitt in ~240 m/px.";
  };
  base.onerror = () => {
    loadBtn.textContent = "latest.jpg nicht erreichbar — Workflow-Lauf pruefen.";
  };
  base.src = "sat_movie/latest.jpg" + bust;
  if (base.complete && base.naturalWidth > 0) base.onload();   // Cache-Fall
};

// --- Pan & Pinch -----------------------------------------------------------
const ptrs = new Map();
let pinchD = 0, lastTap = 0;
vp.addEventListener("pointerdown", e => {
  ptrs.set(e.pointerId, [e.clientX, e.clientY]);
  vp.setPointerCapture(e.pointerId);
});
vp.addEventListener("pointermove", e => {
  if (!ptrs.has(e.pointerId) || !meta) return;
  const prev = ptrs.get(e.pointerId);
  ptrs.set(e.pointerId, [e.clientX, e.clientY]);
  if (ptrs.size === 1) {
    tx += e.clientX - prev[0]; ty += e.clientY - prev[1]; apply();
  } else if (ptrs.size === 2) {
    const [a, b] = [...ptrs.values()];
    const d = Math.hypot(a[0] - b[0], a[1] - b[1]);
    if (pinchD > 0) zoomAt((a[0]+b[0])/2, (a[1]+b[1])/2, d / pinchD);
    pinchD = d;
  }
});
["pointerup", "pointercancel"].forEach(t => vp.addEventListener(t, e => {
  ptrs.delete(e.pointerId); pinchD = 0;
  if (t === "pointerup" && ptrs.size === 0) {
    const nowT = Date.now();
    if (nowT - lastTap < 350) deepZoom(e.clientX, e.clientY);
    lastTap = nowT;
  }
}));
vp.addEventListener("wheel", e => {
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.18 : 1 / 1.18);
}, { passive: false });
vp.addEventListener("dblclick", e => deepZoom(e.clientX, e.clientY));

function zoomAt(cx, cy, f) {
  const r = vp.getBoundingClientRect();
  const px = cx - r.left, py = cy - r.top;
  const ns = Math.min(Math.max(scale * f, 0.1), 12);
  tx = px - (px - tx) * (ns / scale);
  ty = py - (py - ty) * (ns / scale);
  scale = ns; apply();
}

// --- Live-Detailzoom aus GIBS -----------------------------------------------
const HALF_M = 110000;          // Ausschnitt ±110 km -> ~244 m/px bei 900 px
function deepZoom(cx, cy) {
  if (!meta) return;
  const r = vp.getBoundingClientRect();
  const ix = (cx - r.left - tx) / scale;    // Pixel im Gesamtbild
  const iy = (cy - r.top - ty) / scale;
  const fr = meta.frame;
  const rowIdx = iy < fr.cap + fr.panel_h + fr.cap / 2 ? 0 : 1;
  const layer = meta.layers[Math.min(rowIdx, meta.layers.length - 1)];
  const secIdx = Math.min(2, Math.max(0,
      Math.floor(ix / (fr.panel_w + fr.gap))));
  const sec = meta.sectors[secIdx];
  const z = sec.zoom || {};
  if (!z.time || !z.layers) return;
  const px = ix - secIdx * (fr.panel_w + fr.gap);
  const rowTop = rowIdx * (fr.panel_h + fr.cap) + fr.cap
               + (fr.panel_h - sec.h) / 2;
  const py = iy - rowTop;
  if (px < 0 || px > fr.panel_w || py < 0 || py > sec.h) return;
  const [x1, y1, x2, y2] = sec.bbox;
  const X = x1 + (px / fr.panel_w) * (x2 - x1);
  const Y = y2 - (py / sec.h) * (y2 - y1);

  // Kandidaten: Ueberfluege (neu -> alt), dann Tageskomposit heute/gestern.
  // Grund: der juengste Pass deckt nicht jede Stelle des Sektors ab.
  const zl = z.layers[Math.min(rowIdx, z.layers.length - 1)];
  const granLayer = zl.endsWith("_Granule") ? zl : zl + "_Granule";
  const dailyLayer = zl.replace(/_Granule$/, "");
  const cands = [];
  (sec.granules || []).slice().reverse().forEach(t => {
    if (t.includes("T")) cands.push({ t: t, layer: granLayer });
  });
  const d0 = (z.time || "").slice(0, 10);
  if (d0) {
    const prev = new Date(Date.parse(d0 + "T00:00:00Z") - 86400000)
      .toISOString().slice(0, 10);
    cands.push({ t: d0, layer: dailyLayer });
    cands.push({ t: prev, layer: dailyLayer });
  }
  if (!cands.length) return;

  const mkUrl = (c, withCoast) => meta.wms
    + "?SERVICE=WMS&REQUEST=GetMap&VERSION=1.1.1&STYLES="
    + "&LAYERS=" + encodeURIComponent(
        withCoast ? c.layer + ",Coastlines_15m" : c.layer)
    + "&SRS=EPSG:3413&FORMAT=image/jpeg&WIDTH=900&HEIGHT=900"
    + `&BBOX=${(X-HALF_M).toFixed(0)},${(Y-HALF_M).toFixed(0)},`
    + `${(X+HALF_M).toFixed(0)},${(Y+HALF_M).toFixed(0)}`
    + "&TIME=" + encodeURIComponent(c.t);
  const srcTxt = (t) => t.includes("T")
    ? `Überflug ${t.slice(8,10)}.${t.slice(5,7)}. ${t.slice(11,16)}Z`
    : `Tageskomposit ${t}`;

  const box = document.getElementById("zoombox");
  const img = document.getElementById("zoomimg");
  const cap = document.getElementById("zoomcap");
  box.style.display = "flex";

  function isDark(im) {
    try {
      const c = document.createElement("canvas");
      c.width = 32; c.height = 32;
      const g = c.getContext("2d");
      g.drawImage(im, 0, 0, 32, 32);
      const d = g.getImageData(0, 0, 32, 32).data;
      let s = 0;
      for (let i = 0; i < d.length; i += 4) s += d[i] + d[i+1] + d[i+2];
      return s / (d.length / 4) / 3 < 8;   // schwarz trotz Kuestenlinien
    } catch (e) { return false; }          // CORS-Problem: Bild akzeptieren
  }

  let k = 0, withCoast = true, url = "";
  function tryNext() {
    if (k >= cands.length) {
      cap.innerHTML = "Keine Bilddaten an dieser Stelle in den " +
        "verfügbaren Quellen.<br>" +
        `<a href="${url}" target="_blank" style="color:#58a6ff">letzte URL öffnen</a>`;
      return;
    }
    const c = cands[k];
    url = mkUrl(c, withCoast);
    cap.textContent = "prüfe " + srcTxt(c.t) + " …";
    console.log("Zoom-URL:", url);
    img.src = url;
  }
  img.crossOrigin = "anonymous";
  img.onload = () => {
    const c = cands[k];
    if (isDark(img)) { k++; withCoast = true; tryNext(); return; }
    const note = k > 0 ? " (jüngere Quelle ohne Abdeckung hier)" : "";
    cap.textContent = `${layer.label} — Sektor ${sec.name} — ${srcTxt(c.t)}` +
      `${note} — 220×220 km (~244 m/px), live von NASA GIBS`;
  };
  img.onerror = async () => {
    if (withCoast) { withCoast = false; tryNext(); return; }
    let detail = "";
    try {
      const r = await fetch(url);
      detail = (await r.text()).replace(/<[^>]+>/g, " ")
                               .replace(/\s+/g, " ").trim().slice(0, 280);
      detail = `HTTP ${r.status}: ${detail}`;
    } catch (e) { detail = "fetch: " + e; }
    cap.innerHTML = "GIBS-Fehler — " + detail + "<br>" +
      `<a href="${url}" target="_blank" style="color:#58a6ff">URL im neuen Tab öffnen</a>`;
  };
  tryNext();
}
</script>
</body>
</html>
